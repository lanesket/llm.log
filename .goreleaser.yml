version: 2

before:
  hooks:
    - go build -o /tmp/llm-log-completions ./cmd/llm-log
    - mkdir -p completions
    - sh -c "/tmp/llm-log-completions completion bash > completions/llm-log.bash"
    - sh -c "/tmp/llm-log-completions completion zsh > completions/llm-log.zsh"
    - sh -c "/tmp/llm-log-completions completion fish > completions/llm-log.fish"

builds:
  - main: ./cmd/llm-log
    binary: llm-log
    ldflags:
      - -s -w -X github.com/lanesket/llm.log/internal/cli.Version={{.Version}}
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64

archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    files:
      - completions/*

brews:
  - name: llm-log
    repository:
      owner: lanesket
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Formula
    homepage: https://github.com/lanesket/llm.log
    description: Local proxy that tracks tokens, costs, prompts and responses across all LLM API calls
    license: MIT
    extra_install: |
      bash_completion.install "completions/llm-log.bash" => "llm-log"
      zsh_completion.install "completions/llm-log.zsh" => "_llm-log"
      fish_completion.install "completions/llm-log.fish" => "llm-log.fish"
    test: |
      system "#{bin}/llm-log", "--version"

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
